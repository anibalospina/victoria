name: Update Match Dataset

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest results.csv
        run: |
          curl -o results.csv https://raw.githubusercontent.com/martj42/international_results/master/results.csv

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "[Auto] Update results.csv match dataset" && git push)
